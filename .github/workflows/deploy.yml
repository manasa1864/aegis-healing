name: Deploy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'

jobs:

  pre-deploy-check:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install checker deps
        run: pip install requests pyyaml

      - name: Run pre-deploy checks
        run: python scripts/pre_deploy_check.py

  staging-deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [pre-deploy-check]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm ci

      - name: Build for staging
        run: npm run build:staging

      - name: Deploy to staging server
        run: scp -r dist/ user@staging.example.com:/var/www/app/

      - name: Run smoke tests
        run: curl -f https://staging.example.com/health || exit 1

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [staging-deploy]
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Deploy ${{ job.status }}: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}