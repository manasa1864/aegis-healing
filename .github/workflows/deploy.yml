name: Deploy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'

jobs:

  # ─────────────────────────────────────────────────────────────
  # BUG 32: Python version wrong type
  # BUG 33: Wrong pip flag
  # BUG 34: Script file doesn't exist
  # ─────────────────────────────────────────────────────────────
  pre-deploy-check:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12   # BUG 32: Should be string "3.12"

      - name: Install checker deps
        run: pip install requests pyyaml  --break-system-packges  # BUG 33: Typo in flag

      - name: Run pre-deploy checks
        run: python scripts/pre_deploy_check.py  # BUG 34: This file doesn't exist

  staging-deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [pre-deploy-check]
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci   # BUG 35: No lockfile

      - name: Build for staging
        run: |
          export API_URL=${{ secrets.STAGING_API_URL }}   # BUG 36: Secret not defined
          npm run build:staging   # BUG 37: Script doesn't exist in package.json

      - name: Deploy to staging server
        run: |
          # BUG 38: scp without SSH key setup — will hang/fail
          scp -r dist/ user@staging.example.com:/var/www/app/

      - name: Run smoke tests
        run: |
          sleep 10
          # BUG 39: curl to a fake URL
          curl -f https://staging.example.com/health || exit 1

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [staging-deploy]
    if: always()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.99.99  # BUG 40: Version doesn't exist
        with:
          payload: |
            {
              "text": "Deploy ${{ job.status }}: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}  # BUG 41: Not defined
