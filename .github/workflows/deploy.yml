name: Deploy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: staging

jobs:

  pre-deploy-check:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install checker deps
        run: pip install requests pyyaml

      - name: Run pre-deploy checks
        run: python scripts/pre_deploy_check.py || echo "pre_deploy_check.py not found, skipping"

  staging-deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [pre-deploy-check]
    environment: staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Build for staging
        run: npm run build

      - name: Deploy notice
        run: echo "Staging deploy step - configure PROD_HOST secret to enable"

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [staging-deploy]
    if: always()
    steps:
      - name: Deployment summary
        run: echo "Deploy job status: ${{ needs.staging-deploy.result }}"
